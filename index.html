<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MMES PUBLIC School</title>

    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      /* ---- MMES Brand Colors ---- */
      :root {
        --mmes-green:       #3d6b10; /* Deep olive green (logo border) */
        --mmes-green-light: #4d8c14;
        --mmes-green-pale:  #eef5e7; /* Very light tint for backgrounds */
        --mmes-green-mid:   #c6dda8; /* Mid tint for borders */
        --mmes-black:       #1a1a1a; /* Logo banner black */
        --mmes-gold:        #c9a227; /* Logo star gold */
        --mmes-gold-pale:   #fdf6e0;

        /* ---- Playful kid palette ---- */
        --kid-coral:  #ff6b6b;
        --kid-orange: #ff9f43;
        --kid-yellow: #ffd23f;
        --kid-sky:    #4dabf7;
        --kid-grape:  #9775fa;
        --kid-mint:   #20c997;
        --kid-pink:   #f783ac;
      }

      body {
        font-family: 'Nunito', sans-serif;
        background-color: #f4f8ff; /* soft playful sky tint */
      }

      /* Chunky rounded display font for headings & buttons */
      h1, h2, h3, h4,
      .font-display {
        font-family: 'Baloo 2', 'Nunito', cursive;
        letter-spacing: -0.01em;
      }

      /* MMES utility classes */
      .bg-mmes          { background-color: var(--mmes-green) !important; }
      .bg-mmes-light    { background-color: var(--mmes-green-light) !important; }
      .bg-mmes-pale     { background-color: var(--mmes-green-pale) !important; }
      .text-mmes        { color: var(--mmes-green) !important; }
      .text-mmes-light  { color: var(--mmes-green-light) !important; }
      .border-mmes      { border-color: var(--mmes-green) !important; }
      .border-mmes-mid  { border-color: var(--mmes-green-mid) !important; }
      .ring-mmes        { --tw-ring-color: var(--mmes-green) !important; }
      .bg-mmes-gold     { background-color: var(--mmes-gold) !important; }
      .bg-mmes-gold-pale{ background-color: var(--mmes-gold-pale) !important; }
      .text-mmes-gold   { color: var(--mmes-gold) !important; }

      /* MMES gradient header */
      .mmes-header-grad {
        background: linear-gradient(135deg, var(--mmes-black) 0%, #2d4a14 60%, var(--mmes-green) 100%);
      }
      /* MMES subtle card accent */
      .mmes-card-accent {
        border-left: 3px solid var(--mmes-green);
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Custom Animations */
      @keyframes zoomIn {
          0% { opacity: 0; transform: scale(0.85); }
          100% { opacity: 1; transform: scale(1); }
      }
      .animate-zoom-in {
          animation: zoomIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* ---- Playful kid animations ---- */
      @keyframes floaty {
          0%, 100% { transform: translateY(0); }
          50%      { transform: translateY(-10px); }
      }
      .animate-floaty { animation: floaty 4s ease-in-out infinite; }

      @keyframes wiggle {
          0%, 100% { transform: rotate(-4deg); }
          50%      { transform: rotate(4deg); }
      }
      .animate-wiggle { animation: wiggle 2.5s ease-in-out infinite; }

      @keyframes pop-in {
          0%   { opacity: 0; transform: scale(0.6) translateY(12px); }
          60%  { opacity: 1; transform: scale(1.06) translateY(-2px); }
          100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-pop-in {
          opacity: 0;
          animation: pop-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes blob-drift {
          0%, 100% { transform: translate(0, 0) scale(1); }
          33%      { transform: translate(20px, -18px) scale(1.08); }
          66%      { transform: translate(-16px, 14px) scale(0.95); }
      }
      .animate-blob { animation: blob-drift 14s ease-in-out infinite; }

      @keyframes twinkle {
          0%, 100% { opacity: 0.2; transform: scale(0.8); }
          50%      { opacity: 1;   transform: scale(1.2); }
      }
      .animate-twinkle { animation: twinkle 3s ease-in-out infinite; }

      /* Fun chunky drop-shadow used on kid cards */
      .kid-card-shadow { box-shadow: 0 10px 22px -8px rgba(0,0,0,0.28); }

      @media (prefers-reduced-motion: reduce) {
          .animate-floaty, .animate-wiggle, .animate-blob,
          .animate-twinkle { animation: none; }
      }
    </style>
